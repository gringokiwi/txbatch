<!doctype html>
<html lang="en" data-webtui-theme="catppuccin-mocha">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>txbatch • arkade vtxo chain viewer</title>
  <link rel="stylesheet" href="/style.css">
  <script type="module" src="/main.ts"></script>
  <script>
    document.documentElement.dataset.webtuiTheme =
      window.matchMedia('(prefers-color-scheme: dark)').matches ? 'catppuccin-mocha' : 'catppuccin-latte'
  </script>
</head>

<body>
  <main>
    <section box-="double" shear-="top">
      <header>
        <span is-="badge" variant-="background0">txbatch • vtxo chain viewer</span>
      </header>
      <form tabindex="0">
        <label>
          user pubkey (x-only)
          <input id="userPubkey" type="text" value="" readonly />
        </label>
        <label>
          operator pubkey (x-only)
          <input id="operatorPubkey" type="text" value="" readonly />
        </label>
        <label>
          exit timelock (seconds)
          <input id="exitTimelock" type="number" value="" readonly />
        </label>
        <label>
          delegate pubkey (x-only)
          <input id="delegatePubkey" type="text" value="" readonly />
        </label>
        <label>
          address #1
          <input id="address-0" type="text" value="" readonly />
        </label>
        <label>
          script #1
          <input id="script-0" type="text" value="" readonly />
        </label>
        <label>
          transaction id
          <input id="vtxo-txid" type="text" value="" readonly />
        </label>
        <label>
          output index (vout)
          <input id="vtxo-vout" type="number" value="" readonly />
        </label>

          <button type="submit" variant-="foreground1" disabled>submit</button>
          <button type="button" variant-="background1" disabled>go back</button>
